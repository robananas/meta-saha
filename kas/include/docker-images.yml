header:
  version: 17

local_conf_header:
  saha-docker-images: |
    VIRTUAL-RUNTIME_container_engine ??= "docker"
    VIRTUAL-RUNTIME_container_runtime ??= "virtual-runc"
    VIRTUAL-RUNTIME_container_networking ??= "cni"
    VIRTUAL-RUNTIME_container_dns ??= "cni"
    DISTRO_FEATURES:append = " seccomp"
    IMAGE_ROOTFS_EXTRA_SPACE:append:pn-saha-image-robot = " + 4718592"
    IMAGE_ROOTFS_EXTRA_SPACE:append:pn-saha-image-robot-docker = " + 4718592"
