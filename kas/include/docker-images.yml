header:
  version: 17

local_conf_header:
  saha-docker-images: |
    VIRTUAL-RUNTIME_container_engine ??= "docker"
    VIRTUAL-RUNTIME_container_runtime ??= "virtual-runc"
    VIRTUAL-RUNTIME_container_networking ??= "cni"
    VIRTUAL-RUNTIME_container_dns ??= "cni"
    DISTRO_FEATURES:append = " seccomp"
    IMAGE_INSTALL:append:pn-saha-image-robot = " packagegroup-saha-docker-images"
    HA_CONTAINER_LOCAL_TAR ?= "${DL_DIR}/homeassistant-container.tar"
    MATTER_SERVER_CONTAINER_LOCAL_TAR ?= "${DL_DIR}/matter-server-container.tar"
    ROBAN_WORKFLOW_LOCAL_TAR ?= "${DL_DIR}/roban-workflow-api.tar"
    IMAGE_ROOTFS_EXTRA_SPACE:append:pn-saha-image-robot = " + 4718592"
