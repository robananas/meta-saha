header:
  version: 17

repos:
  meta-ros:
    path: repos/meta-ros
    url: https://github.com/ros/meta-ros.git
    branch: "superflore/wrynose/jazzy/2026-06-18"
    layers:
      meta-ros-common:
      meta-ros2:
      meta-ros2-jazzy:

target:
  - saha-image-ros-jazzy-deps

local_conf_header:
  saha-ros-jazzy: |
    ROS2_DISTRO = "jazzy"
    BBMASK += "meta-ros/meta-ros2-jazzy/recipes-support/fuse/"
