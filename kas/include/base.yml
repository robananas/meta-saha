header:
  version: 17
  includes:
    - kas/include/repos-wrynose.yml

distro: tegra-saha

target:
  - saha-image-base

local_conf_header:
  saha-cache: |
    DL_DIR ?= "${@os.environ.get('DL_DIR', '${TOPDIR}/downloads')}"
    SSTATE_DIR ?= "${@os.environ.get('SSTATE_DIR', '${TOPDIR}/sstate-cache')}"
    TMPDIR ?= "${@os.environ.get('TMPDIR', '${TOPDIR}/tmp')}"
    BB_HASHSERVE_DB_DIR ?= "${SSTATE_DIR}"
  saha-build-defaults: |
    PACKAGE_CLASSES ?= "package_rpm"
    SDKMACHINE ?= "x86_64"
    EXTRA_IMAGE_FEATURES ?= "empty-root-password allow-root-login"
    PATCHRESOLVE = "noop"
    PREFERRED_PROVIDER_edk2-nvidia-standalone-mm = "edk2-nvidia-standalone-mm-prebuilt"
  saha-build-tuning: |
    BB_NUMBER_THREADS ?= "${@os.environ.get('SAHA_BB_NUMBER_THREADS', '4')}"
    BB_NUMBER_PARSE_THREADS ?= "${@os.environ.get('SAHA_BB_NUMBER_PARSE_THREADS', '4')}"
    PARALLEL_MAKE ?= "${@os.environ.get('SAHA_PARALLEL_MAKE', '-j 4')}"
  saha-kas-compat: |
    # These classes are designed for OE4T setup-env generated builds and
    # mutate bblayers.conf, so kas builds disable them explicitly.
    INHERIT:remove = "tegra-support-sanity distro_layer_buildinfo"
