# Saha default Home Assistant configuration.
# Custom components: SmartIR, Xiaomi Home, HACS (under custom_components/).
# Integrations: Matter (local matter-server), Broadlink (auto-discovery).

# Keep the HA frontend and device discovery, but omit optional default_config
# features such as Energy, History, Logbook, Media Source, Map, and To-do.
homeassistant:
  packages: !include_dir_named packages

frontend:
  themes: !include_dir_merge_named themes

# Discovery required by local integrations, Xiaomi gateways, Matter, and Bluetooth.
bluetooth:
dhcp:
ssdp:
usb:
webhook:
zeroconf:

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

logger:
  default: info
  logs:
    custom_components.xiaomi_home: info

smartir:
  check_updates: false

climate:
  - platform: smartir
    name: 日立空调1084
    unique_id: hitachi_ac_rm4
    device_code: 1084
    controller_data: remote.rm4_mini_01

media_player:
  - platform: smartir
    name: Meeting room TV-02
    unique_id: meeting_room_tv_02
    device_code: 1380
    controller_data: remote.rm4_mini_01

lovelace:
  resource_mode: yaml
  dashboards:
    lovelace:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Overview
      icon: mdi:view-dashboard
      show_in_sidebar: true

# Configure HA's Matter integration against the board-local Matter Server on
# first boot. The bootstrap is idempotent and leaves existing entries unchanged.
saha_matter:
  url: "ws://127.0.0.1:5580/ws"
