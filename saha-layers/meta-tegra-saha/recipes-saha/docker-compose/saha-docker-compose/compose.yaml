services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2026.7.1
    volumes:
      - /var/lib/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: on-failure:5
    privileged: true
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Shanghai}

  matter-server:
    container_name: matter-server
    image: ghcr.io/matter-js/python-matter-server:arm64
    restart: on-failure:5
    network_mode: host
    security_opt:
      - apparmor:unconfined
    volumes:
      - /var/lib/matter-server:/data
      - /run/dbus:/run/dbus:ro
    environment:
      TZ: ${TZ:-Asia/Shanghai}

  roban-workflow-api:
    container_name: roban-workflow-api
    image: roban-workflow-api:arm64
    restart: on-failure:5
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Shanghai}

  livekit-server:
    container_name: livekit-server
    image: ${SAHA_LIVEKIT_SERVER_IMAGE:-livekit/livekit-server:v1.13.4}
    restart: on-failure:5
    network_mode: host
    env_file:
      - ${SAHA_LIVEKIT_CREDENTIALS_FILE:-/var/lib/saha/livekit/credentials.env}
    command:
      - --bind
      - 0.0.0.0
      - --udp-port
      - "7882"

  livekit-agent:
    container_name: livekit-agent
    image: ${SAHA_LIVEKIT_AGENT_IMAGE:-livekit-agent:arm64}
    restart: on-failure:5
    network_mode: host
    depends_on:
      - livekit-server
    env_file:
      - ${SAHA_LIVEKIT_CREDENTIALS_FILE:-/var/lib/saha/livekit/credentials.env}
    environment:
      LIVEKIT_URL: ws://127.0.0.1:7880
      LIVEKIT_AGENT_NAME: ${SAHA_LIVEKIT_AGENT_NAME:-roban-agent}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ROBAN_TOKEN_PORT: "7883"
