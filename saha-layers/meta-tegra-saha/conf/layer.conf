BBPATH =. "${LAYERDIR}:"

# Do not use recipes-* here: recipes-ros is loaded only via BBFILES_DYNAMIC.
BBFILES += "${LAYERDIR}/recipes-bsp/*/*.bb ${LAYERDIR}/recipes-bsp/*/*.bbappend"
BBFILES += "${LAYERDIR}/recipes-connectivity/*/*.bb ${LAYERDIR}/recipes-connectivity/*/*.bbappend"
BBFILES += "${LAYERDIR}/recipes-core/*/*.bb ${LAYERDIR}/recipes-core/*/*.bbappend"
BBFILES += "${LAYERDIR}/recipes-saha/*/*.bb ${LAYERDIR}/recipes-saha/*/*.bbappend"
BBFILES += "${LAYERDIR}/recipes-support/*/*.bb ${LAYERDIR}/recipes-support/*/*.bbappend"

# ROS bbappends and packagegroups require meta-ros2 (ros2-layer).
BBFILES_DYNAMIC += " \
  ros2-layer:${LAYERDIR}/recipes-ros/*/*.bb \
  ros2-layer:${LAYERDIR}/recipes-ros/*/*.bbappend \
"

BBFILE_COLLECTIONS += "tegra-saha"
BBFILE_PATTERN_tegra-saha = "^${LAYERDIR}/"
BBFILE_PRIORITY_tegra-saha = "50"

LAYERVERSION_tegra-saha = "4"
LAYERSERIES_COMPAT_tegra-saha = "wrynose"

# This is used by the tegra-distro-sanity bbclass
# to identify the distro layer directory during
# bblayers checks.
TD_DISTRO_LAYERDIR = "${LAYERDIR}"
